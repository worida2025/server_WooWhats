# Docker Compose for WooWhats Server
version: '3.8'

services:
  woowhats-server:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MAX_RECONNECT_ATTEMPTS=5
      - WHATSAPP_SESSION_PATH=/tmp/wwebjs_auth
      - ALLOWED_ORIGINS=*
    volumes:
      # Mount volume for session persistence (optional)
      - wwebjs_auth:/tmp/wwebjs_auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const options={hostname:'localhost',port:3000,path:'/health',timeout:3000};const req=http.request(options,res=>{process.exit(res.statusCode===200?0:1)});req.on('error',()=>process.exit(1));req.end();"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  wwebjs_auth:
