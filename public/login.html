<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WooWhats Dashboard - Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🔐 WooWhats Dashboard</h1>
            <p style="color: #666; margin-bottom: 30px;">Please login to access the WhatsApp dashboard</p>
            
            <form action="/dashboard/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn">Login to Dashboard</button>
            </form>
            
            <div class="demo-info">
                <h3>🧪 Demo Login Credentials</h3>
                <p><strong>Username:</strong> admin</p>
                <p><strong>Password:</strong> demo123</p>
                <p style="margin-top: 10px; font-size: 14px; color: #666;">
                    These are demo credentials for testing purposes.
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-fill demo credentials for convenience
        document.addEventListener('DOMContentLoaded', function() {
            const demoInfo = document.querySelector('.demo-info');
            if (demoInfo) {
                demoInfo.addEventListener('click', function() {
                    document.getElementById('username').value = 'admin';
                    document.getElementById('password').value = 'demo123';
                });
            }
        });
    </script>
</body>
</html>
